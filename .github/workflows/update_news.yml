name: Hourly Forex News Scraper

on:
  schedule:
    - cron: '*/15 * * * *'  # Bangun setiap menit ke-0, 15, 30, dan 45
  workflow_dispatch:     # Tombol manual

permissions:
  contents: write        # ⚡ SANGAT PENTING: Beri izin robot untuk menulis/mengubah file di repo!

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install pandas selenium bs4 webdriver-manager

      - name: Execute WBS Cloud Miner
        run: python github_news_scraper.py

      # ⚡ INI DIA KUNCI JAWABANNYA: Paksa robot nge-save dan push file CSV ke GitHub Jenderal!
      - name: Commit and Push Database Update
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "WBS Cloud Robot"
          git add data/forex_news_usd_2015_2026.csv
          git commit -m "🔥 Auto-Update: Live Amnesia News Ledger Sync" || echo "Tidak ada perubahan data"
          git push
